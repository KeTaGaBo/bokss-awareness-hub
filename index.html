<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Security Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" id="quizCard">
    <div class="topbar">
      <div>
        <div class="badge" id="badge"></div>
      </div>

      <div class="lang-box">
        <div class="lang-label" id="langLabel">Language / 語言 / 语言</div>
        <select id="langSelect">
          <option value=\"zh-HK\">繁體中文</option>
          <option value=\"zh-CN\">简体中文</option>
          <option value=\"en\">English</option>
        </select>
      </div>
    </div>

    <div class="hero-subtitle" id="heroSubtitle"></div>
    <h1 id="siteTitle"></h1>
    <div class="intro" id="intro"></div>

    <div id="questionArea">
      <div class="meta" id="meta"></div>
      <h2 class="question-title" id="title"></h2>

      <div id="storyCard" class="story-card">
        <div class="story-label" id="storyLabel"></div>
        <div class="story-title" id="storyTitle"></div>
        <div id="storyContent"></div>
      </div>

      <div class="scenario" id="question"></div>
      <div class="question-type" id="questionType"></div>
      <div class="question-hint" id="questionHint"></div>

      <div id="answers"></div>

      <div class="answer-action" id="answerAction" style=\"display:none;\">
        <button id="checkBtn" class="action-btn"></button>
      </div>

      <div id="result" class="result"></div>
    </div>

    <div class="controls">
      <button class="nav-btn primary" id="nextBtn"></button>
    </div>
  </div>

  <div id="hiddenCardCapture" class="hidden-capture-container">
    <div class="cert-card">
      <div class="cert-header">
        <span class="cert-badge-top" id="certBadgeTop"></span>
        <h1 class="cert-title" id="certTitleLabel">CERTIFICATE</h1>
      </div>
      
      <div class="cert-body">
        <div class="cert-info">
          <h2 class="cert-site-title" id="certSiteTitle"></h2>
          
          <div class="cert-data-row">
            <span class="cert-data-label" id="certScoreLabel"></span>
            <span class="cert-data-value" id="certScoreVal"></span>
          </div>
          
          <div class="cert-data-row">
            <span class="cert-data-label" id="certLevelLabel"></span>
            <span class="cert-data-value highlighted" id="certLevelName"></span>
          </div>
          
          <p class="cert-msg" id="certMsgVal"></p>
          <p class="cert-qrtip" id="certQrTip"></p>
        </div>
        
        <div class="cert-visual">
          <img class="cert-badge-img" id="certBadgeImg" src=\"\" alt=\"Security Badge\">
        </div>
      </div>
      
      <div class="cert-footer">
        <div class="cert-qr-zone">
          <div class="cert-qr-placeholder">
            <div class="qr-block"></div>
          </div>
          <div class="cert-qr-text">
            <span class="cert-quiz-name" id="certQuizName"></span>
            <span class="cert-motto" id="certMotto"></span>
          </div>
        </div>
        <div class="cert-watermark">INTERACTIVE QUIZ</div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
