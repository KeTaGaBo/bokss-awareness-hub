<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awareness Hub</title>

  <style>
    body {
      font-family: Arial;
      background: #fff8ec;
      padding: 20px;
      color: #1f1f1f;
    }

    h1 {
      margin-bottom: 10px;
    }

    .quiz-list {
      margin-top: 20px;
    }

    .quiz-card {
      border: 2px solid #1f1f1f;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 12px;
      background: white;
      box-shadow: 4px 4px 0 #1f1f1f;
    }

    .quiz-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .quiz-desc {
      color: #555;
      margin-bottom: 10px;
    }

    .start-btn {
      display: inline-block;
      background: #ff6b6b;
      color: white;
      padding: 8px 12px;
      text-decoration: none;
      border-radius: 8px;
      border: 2px solid #1f1f1f;
    }
  </style>
</head>

<body>

<h1>🎯 Awareness Hub</h1>
<div>請選擇一個測驗開始：</div>

<div class="quiz-list" id="quizList"></div>

<script>
async function loadQuizzes() {
  const res = await fetch('/quizzes.json');
  const data = await res.json();

  const container = document.getElementById('quizList');

  data.forEach(q => {
    if (q.status !== 'active') return;

    const card = document.createElement('div');
    card.className = 'quiz-card';

    card.innerHTML = `
      <div class="quiz-title">${q.title['zh-HK']}</div>
      <div class="quiz-desc">${q.description['zh-HK']}</div>
      <a class="start-btn" href="${q.path}?lang=zh-HKner.appendChild(card);
  });
}

loadQuizzes();
</script>

</body>
</html>
``
